    :root {
        --text-primary: #e0f7fa;
        --text-secondary: #81d4fa;
        --accent-primary: #00e5ff;
        --border-color: rgba(0, 229, 255, 0.3);
        --background-card: rgba(0, 20, 40, 0.65);
    }
    /* mvu-row-sync-v4 */
    * { box-sizing: border-box; }
    /* Gradient Animation */
    @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background: transparent;
        color: var(--text-primary);
        margin: 0; padding: 10px;
        font-size: 16px;
    }

    .status-container, .status-card {
        display: flex; flex-direction: column;
        background: linear-gradient(-45deg, #001f3f, #003366, #006064, #013243);
        background-size: 400% 400%;
        animation: gradient-flow 30s ease infinite;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        min-height: 500px;
        overflow: hidden;
        max-width: 100%;
        box-sizing: border-box;
        transition: width 0.3s;
        margin: 0 auto;
    }

    /* .tab-nav is the canonical tab container. PreviewRenderer uses it too (was .preview-tabs). */
    .tab-nav {
        display: flex;
        background: rgba(0,0,0,0.3);
        border-bottom: 1px solid var(--border-color);
        overflow-x: auto;
    }
    .tab-btn {
        padding: 12px 20px; color: var(--text-secondary); cursor: pointer;
        border-bottom: 2px solid transparent; user-select: none;
    }
    .tab-btn.active {
        color: var(--accent-primary); border-bottom-color: var(--accent-primary);
    }
    /* Builder Preview tab buttons — display-only (cursor: default, no click handler) */
    .p-tab-btn {
        padding: 12px 20px;
        color: var(--text-secondary);
        cursor: default;
        border-bottom: 2px solid transparent;
        user-select: none;
    }
    .p-tab-btn.active {
        color: var(--accent-primary);
        border-bottom: 2px solid var(--accent-primary);
    }

    /* Pagination — shared flex layout */
    .pagination-controls,
    .pagination-controls-sm {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    /* Large pagination (PreviewRenderer top-level list pager) */
    .pagination-controls {
        gap: 15px;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid var(--border-color);
    }
    .pager-btn {
        background: transparent;
        border: 1px solid var(--accent-primary);
        color: var(--accent-primary);
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .pager-btn:disabled {
        border-color: #555;
        color: #555;
        cursor: not-allowed;
    }
    .pager-btn:hover:not(:disabled) {
        background: rgba(0, 229, 255, 0.2);
    }
    .page-info {
        font-size: 0.9em;
        color: #aaa;
    }
    .tab-content { display: none; padding: 10px; height: 100%; overflow-y: auto; }
    .tab-content.active { display: block; }

    .grid-row { display: flex; flex-wrap: wrap; margin: 0 -5px; align-items: stretch; align-content: flex-start; max-width: 100%; }
    .responsive-stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(55px, 1fr));
        gap: 2px;
        width: 100%;
    }
    /* When .grid-row and .responsive-stats-grid are used together, flex wins via specificity (0,2,0 > 0,1,0).
       This replaces the old duplicate .grid-row rule that was previously used as a cascade anchor. */
    .grid-row.responsive-stats-grid { display: flex; flex-wrap: wrap; margin: 0 -5px; align-items: stretch; align-content: flex-start; }
    .grid-full-width {
        grid-column: 1 / -1;
    }
    
    /* Responsive Grid Layout Adjustments */
    .responsive-stats-grid .checkbox-display {
        justify-content: flex-start;
    }
    .col-wrapper { padding: 5px; box-sizing: border-box; min-width: 0; max-width: 100%; overflow: hidden; }
    .info-card {
        background: var(--background-card);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 8px;
        height: 100%;
    }
    .card-header {
        color: var(--accent-primary); font-weight: bold;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 3px; margin-bottom: 4px;
    }

    .prop-list {
        display: flex;
        flex-wrap: wrap;
        margin: 0 -4px;
        width: 100%;
    }
    .prop-row-wrapper { 
        padding: 1px 4px; 
        box-sizing: border-box; 
        min-width: 80px;

    \x3C!-- Grid List Template (Simple) -->

            <span class="tile-qty" data-slot="qty" style="pointer-events:none;"></span>
            
            \x3C!-- Hidden Data Slots for Modal -->
            <div style="display:none" data-slot="desc"></div>
            <div style="display:none" data-slot="difficulty"></div>
            <div style="display:none" data-slot="reward-text"></div>
        </div>
    </template>

    \x3C!-- Quest List Template -->
    <template id="tmpl-quest">
        <div class="quest-card" style="cursor:pointer;">
            <div class="quest-card-header" style="pointer-events:none;">

                <span class="quest-difficulty" style="display:none" data-slot="difficulty"></span>
            </div>
            <div class="quest-desc" style="display:none" data-slot="desc"></div>
            <div class="quest-reward" data-slot="reward" style="display:none">🏆 <span data-slot="reward-text"></span></div>
            <div class="quest-status" data-slot="status-row" style="display:none">Status: <span data-slot="status"></span></div>
            <div class="quest-last-updated" data-slot="last-updated-row" style="display:none">Last Updated: <span data-slot="LastUpdated"></span></div>
        </div>
    </template>

    \x3C!-- Inventory List Template -->
    <template id="tmpl-inventory">
        <div class="grid-tile" style="cursor:pointer; position:relative; display:flex; flex-direction:row; align-items:center; justify-content:space-between; padding:6px 10px; height:100%; min-height:40px; text-align:left; gap: 8px;">

            </div>
            <div style="display:none" data-slot="desc"></div>
        </div>
    </template>

    <template id="tmpl-equipment-action">

            <div style="pointer-events:none;">
                <div class="entry-title" data-slot="title"></div>
                <div class="entry-desc" data-slot="desc"></div>
            </div>
            <button class="unequip-btn" title="Unequip" style="z-index:10;">📤</button>
        </div>
    </template>

    \x3C!-- Simple List Template -->
    <template id="tmpl-simple">

// --- Local Image Compression ---
function compressLocalImage(file, opts) {
    return new Promise((resolve, reject) => {
        if (!file) return reject(new Error('no_file'));
        const maxSide = (opts && opts.maxSide) || 512;
        const maxBytes = (opts && opts.maxBytes) || 240 * 1024;
        const minQuality = (opts && opts.minQuality) || 0.5;
        let quality = (opts && opts.quality) || 0.85;

        const reader = new FileReader();
        reader.onerror = () => reject(new Error('read_failed'));
        reader.onload = () => {
            const img = new Image();
            img.onerror = () => reject(new Error('decode_failed'));
            img.onload = () => {
                const longest = Math.max(img.width, img.height) || 1;
                const scale = Math.min(1, maxSide / longest);
                const targetW = Math.max(1, Math.round(img.width * scale));
                const targetH = Math.max(1, Math.round(img.height * scale));
                const canvas = document.createElement('canvas');
                canvas.width = targetW;
                canvas.height = targetH;
                const ctx = canvas.getContext('2d');
                if (!ctx) return reject(new Error('canvas_failed'));
                ctx.drawImage(img, 0, 0, targetW, targetH);

                const getSize = (s) => Math.ceil((s.split(',')[1] || '').length * 3 / 4);
                let out = canvas.toDataURL('image/jpeg', quality);
                while (getSize(out) > maxBytes && quality > minQuality) {
                    quality = Math.max(minQuality, quality - 0.1);
                    out = canvas.toDataURL('image/jpeg', quality);
                }
                resolve(out);
            };
            img.src = String(reader.result || '');
        };
        reader.readAsDataURL(file);
    });
}
